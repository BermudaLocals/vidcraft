version: "3.8"
services:
  backend:
    build: ./backend
    ports: ["5000:5000"]
    env_file: ./backend/.env
    depends_on: [mongo, redis]
    volumes: ["./backend/temp:/app/temp"]
  frontend:
    build: ./frontend
    ports: ["3000:80"]
    depends_on: [backend]
  mongo:
    image: mongo:7
    ports: ["27017:27017"]
    volumes: ["mongo_data:/data/db"]
  redis:
    image: redis:7-alpine
    ports: ["6379:6379"]
volumes:
  mongo_data:
